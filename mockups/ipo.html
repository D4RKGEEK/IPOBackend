<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">IPO detail — IPORadar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="assets/theme.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="assets/data.js"></script>
  <script src="assets/ui.js"></script>
</head>
<body class="min-h-full pb-20 md:pb-0">
  <header id="nav"></header>
  <main id="app" class="container-app py-5 sm:py-8 pb-28 sm:pb-10"></main>
  <footer id="footer"></footer>

  <script>
    UI.layout('all');
    const F = UI; // alias

    const id = new URLSearchParams(location.search).get('id') || 122;
    const ipo = window.IPO_DATA.get(id);
    const app = document.getElementById('app');

    if (!ipo) {
      app.innerHTML = `<div class="surface p-16 text-center max-w-lg mx-auto">
        <h1 class="text-xl font-bold">IPO not found</h1>
        <p class="text-textMuted mt-2 mb-5">We couldn't find that filing. It may have been removed.</p>
        <a href="ipos.html" class="btn btn-primary mx-auto">Browse all IPOs</a></div>`;
    } else {
      document.getElementById('page-title').textContent =
        `${ipo.company_name} IPO — ${F.priceBand(ipo.price_band)||'price TBA'} · IPORadar`;
    }

    /* ---------- formatters specific to detail ---------- */
    const hasDetail = !!ipo && (ipo.financial_years || ipo.eps_basic);
    function shares(n){ return n==null ? '—' : Number(n).toLocaleString('en-IN'); }
    function amtFromLakhs(L, unit){ // unit decided per company
      if (L==null) return '—';
      return unit==='cr' ? '₹'+(L/100).toLocaleString('en-IN',{maximumFractionDigits:0})+' Cr'
                         : '₹'+L.toLocaleString('en-IN',{maximumFractionDigits:0})+' L';
    }
    function strip(s){ return (s||'').replace(/^Rs\.?\s*/i,'₹'); }

    /* ---------- render ---------- */
    function render() {
      const band = F.priceBand(ipo.price_band);
      const min = F.minInvest(ipo);
      const isListed = ipo.status === 'listed';
      const upper = ipo.price_band ? Number(ipo.price_band.split('-')[1]) : null;

      // tabs available depending on data
      const tabs = [
        {k:'overview', label:'Overview'},
        {k:'financials', label:'Financials'},
        {k:'issue', label:'Issue Details'},
        {k:'promoters', label:'Promoters'},
        {k:'risks', label:'Risks', beta:true},
        {k:'documents', label:'Documents'},
        {k:'gmp', label:'GMP & Subs', badge: ipo.gmp ? null : 'soon'},
        {k:'allotment', label:'Allotment', badge: ipo.allotment ? null : 'soon'},
      ];
      const qTab = new URLSearchParams(location.search).get('tab');
      const initialTab = tabs.some(t => t.k === qTab) ? qTab : 'overview';

      app.innerHTML = `
      <div x-data="{ tab:'${initialTab}', watched:false }">
        <!-- breadcrumb -->
        <nav class="flex items-center gap-1.5 text-[12px] text-textMuted mb-4">
          <a href="index.html" class="hover:text-text">Home</a><span class="text-slate-400">/</span>
          <a href="ipos.html" class="hover:text-text">IPOs</a><span class="text-slate-400">/</span>
          <span class="text-textSecondary truncate">${ipo.company_name}</span>
        </nav>

        <!-- ABOVE THE FOLD -->
        <div class="surface p-4 sm:p-6 relative overflow-hidden">
          <div class="absolute -right-24 -top-24 w-72 h-72 rounded-full ${isListed?'bg-teal-500/10':'bg-primary-50'} blur-3xl pointer-events-none"></div>
          <div class="relative">
            <!-- header row: title + confidence -->
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <div class="flex items-center gap-2 flex-wrap">
                  ${F.platformBadge(ipo.platform)} ${F.statusPill(ipo.status)}
                </div>
                <h1 class="mt-1.5 text-[20px] sm:text-2xl font-bold leading-tight">${ipo.company_name}</h1>
                <div class="mt-1 flex items-center gap-2 flex-wrap text-[11.5px] text-textMuted">
                  ${ipo.sector ? `<span>${ipo.sector}</span>` : ''}
                  ${ipo.cin ? `<span class="hidden sm:inline text-slate-300">·</span><span class="mono hidden sm:inline text-[10.5px]">CIN ${ipo.cin}</span>` : ''}
                </div>
              </div>
              <div class="text-right shrink-0">
                ${ipo.publish_status==='needs_review'
                  ? `<span class="pill pill-amber text-[11px]">⚠ Review</span>`
                  : ipo.confidence_score!=null
                    ? `<div class="mono font-bold text-primary-600 text-[22px] leading-none">${(ipo.confidence_score*100).toFixed(0)}%</div><div class="text-[10px] text-textMuted mt-0.5">confidence</div>` : ''}
                ${ipo.unified_updated_at ? `<div class="text-[10px] text-slate-400 mt-1">${F.relTime(ipo.unified_updated_at)}</div>`:''}
              </div>
            </div>

            <!-- compact 2×2 data grid — always 2 cols on mobile -->
            <div class="mt-4 data-grid">
              ${dcell('Price band', band||'TBA', band?'text-[19px]':'text-slate-400 text-base')}
              ${dcell('Min invest', min ? F.inr(min) : 'TBA', min?'text-[19px]':'text-slate-400')}
              ${dcell('Lot size', ipo.lot_size ? ipo.lot_size+' sh' : 'TBA')}
              ${dcell(isListed?'Listing gain':'Issue size', isListed && ipo.listing_gain_pct!=null
                  ? `<span class="text-[17px] font-bold ${ipo.listing_gain_pct>=0?'text-success-600':'text-danger-600'}">${ipo.listing_gain_pct>=0?'▲+':'▼'}${ipo.listing_gain_pct}%</span>`
                  : F.fmtCr(ipo.issue_size_cr))}
            </div>
            <!-- bid dates — 3 across always -->
            <div class="mt-2 grid grid-cols-3 gap-px bg-border rounded-xl overflow-hidden border border-border">
              ${cell('Bid opens', F.fmtDate(ipo.dates.open, true))}
              ${cell('Closes', F.fmtDate(ipo.dates.close, true))}
              ${cell('Listing', F.fmtDate(ipo.dates.listing, true))}
            </div>

            ${hasDetail ? `<div class="mt-2 grid grid-cols-2 sm:grid-cols-4 gap-2">
              <div class="metric"><div class="metric-label">P / E</div><div class="metric-value">${ipo.pe_ratio||'TBA'}</div></div>
              <div class="metric"><div class="metric-label">ROE</div><div class="metric-value text-success-600">${ipo.roe_percent||'TBA'}</div></div>
              <div class="metric"><div class="metric-label">EPS</div><div class="metric-value">${strip(ipo.eps_basic)||'TBA'}</div></div>
              <div class="metric"><div class="metric-label">NAV</div><div class="metric-value">${strip(ipo.nav_per_share)||'TBA'}</div></div>
            </div>` : ''}

            <!-- actions — desktop: inline row; mobile: hidden (sticky bar below) -->
            <div class="mt-4 hidden sm:flex items-center gap-2.5">
              <button @click="watched=!watched" class="btn tap" :class="watched?'btn-primary':'btn-secondary'">
                <svg class="w-4 h-4" :fill="watched?'currentColor':'none'" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.5a.56.56 0 0 1 1.04 0l2.18 4.42 4.88.71c.47.07.66.65.32.98l-3.53 3.44.83 4.86c.08.47-.41.82-.83.6L12 16.6l-4.37 2.3c-.42.22-.91-.13-.83-.6l.83-4.86-3.53-3.44c-.34-.33-.15-.91.32-.98l4.88-.71L11.48 3.5Z"/></svg>
                <span x-text="watched?'Watching':'Watch'"></span>
              </button>
              <button class="btn btn-secondary tap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a24 24 0 0 0 5.454-1.31A8.97 8.97 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.97 8.97 0 0 1-2.312 6.022 24 24 0 0 0 5.455 1.31m5.714 0a24 24 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/></svg>
                Alert me <span class="badge-mono ml-1">soon</span>
              </button>
              <button class="btn btn-dark ml-auto tap">Apply via broker <span class="badge-mono border-white/30 text-white/70 ml-1">soon</span></button>
            </div>
          </div>
        </div>

        <!-- LIFECYCLE -->
        <div class="surface px-4 py-4 mt-3 overflow-x-auto">
          <div class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold mb-3">Lifecycle</div>
          <div class="overflow-x-auto pb-1">${F.lifecycle(ipo.status, ipo.dates)}</div>
        </div>

        <!-- TABS -->
        <div class="sticky top-14 z-20 mt-4 -mx-5 sm:mx-0 bg-background/95 backdrop-blur-xl">
          <div class="flex items-center gap-0 overflow-x-auto border-b border-border scroll-x" style="-webkit-overflow-scrolling:touch;scrollbar-width:none;" onscroll="this.style.mask=''" >
            <div class="w-4 sm:w-0 shrink-0"></div>
            ${tabs.map(t=>`<button @click="tab='${t.k}'" class="tab tap shrink-0" :class="tab==='${t.k}'&&'active'">
              ${t.label}${t.badge?`<span class="badge-mono border-slate-300 text-slate-400 ml-1">${t.badge}</span>`:''}${t.beta?'<span class="badge-mono border-violet-200 text-violet-600 ml-1">beta</span>':''}
            </button>`).join('')}
          </div>
        </div>

        <!-- PANELS -->
        <div class="mt-6">
          <div x-show="tab==='overview'"   x-cloak>${tabOverview()}</div>
          <div x-show="tab==='financials'" x-cloak>${tabFinancials()}</div>
          <div x-show="tab==='issue'"      x-cloak>${tabIssue(upper)}</div>
          <div x-show="tab==='promoters'"  x-cloak>${tabPromoters()}</div>
          <div x-show="tab==='risks'"      x-cloak>${tabRisks()}</div>
          <div x-show="tab==='documents'"  x-cloak>${tabDocuments()}</div>
          <div x-show="tab==='gmp'"        x-cloak>${tabGmp()}</div>
          <div x-show="tab==='allotment'"  x-cloak>${tabAllotment()}</div>
        </div>
      </div>

      <!-- mobile sticky bottom bar (sm and below) -->
      <div class="sm:hidden sticky-bar flex items-center gap-2.5">
        <button @click="watched=!watched" class="btn tap flex-1" :class="watched?'btn-primary':'btn-secondary'">
          <svg class="w-4 h-4 shrink-0" :fill="watched?'currentColor':'none'" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.5a.56.56 0 0 1 1.04 0l2.18 4.42 4.88.71c.47.07.66.65.32.98l-3.53 3.44.83 4.86c.08.47-.41.82-.83.6L12 16.6l-4.37 2.3c-.42.22-.91-.13-.83-.6l.83-4.86-3.53-3.44c-.34-.33-.15-.91.32-.98l4.88-.71L11.48 3.5Z"/></svg>
          <span x-text="watched?'Watching':'Watch'"></span>
        </button>
        <button class="btn btn-dark tap flex-[2]">
          Apply via broker
          <span class="badge-mono border-white/30 text-white/70">soon</span>
        </button>
      </div>`;
    }

    function cell(label, val, cls){
      return `<div class="bg-surface px-3 sm:px-4 py-3">
        <div class="data-cell-label">${label}</div>
        <div class="data-cell-value text-[14px] sm:text-[15px] ${cls||'text-text'}">${val}</div>
      </div>`;
    }
    // 2-col data cell for the compact header grid
    function dcell(label, val, valCls){
      return `<div class="data-cell">
        <div class="data-cell-label">${label}</div>
        <div class="data-cell-value ${valCls||''}">${val}</div>
      </div>`;
    }
    function notReady(msg){
      return `<div class="surface p-12 text-center">
        <div class="w-12 h-12 rounded-xl bg-slate-50 border border-border flex items-center justify-center mx-auto mb-3">
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z"/></svg>
        </div>
        <h3 class="font-semibold">${msg}</h3>
        <p class="text-[13px] text-textMuted mt-1.5 mb-4">We parse the filing within 24 hours of publication. Watch this IPO to get notified.</p>
        <a href="signup.html" class="btn btn-secondary btn-sm mx-auto">Notify me when ready</a>
      </div>`;
    }

    /* ---------------- TAB: OVERVIEW ---------------- */
    function tabOverview(){
      if (!hasDetail) return notReady('Detailed analysis coming soon');
      const metric = (l,v,c)=>`<div class="kpi"><div class="kpi-label">${l}</div><div class="kpi-value ${c||''}">${v||'TBA'}</div></div>`;
      const debt = ipo.total_borrowings ? ipo.total_borrowings[ipo.total_borrowings.length-1] : null;
      const unit = ipo.total_revenue && Math.max(...ipo.total_revenue)>=100000 ? 'cr':'l';
      const objects = (ipo.fund_usage_breakdown||[]).map(o=>`
        <div>
          <div class="flex items-center justify-between text-[13px] mb-1">
            <span class="text-textSecondary truncate pr-3">${o.use}</span>
            <span class="mono text-text shrink-0">${strip(o.amount)}</span>
          </div>
          <div class="h-1.5 rounded-full bg-slate-100 overflow-hidden"><div class="h-full bg-primary-500 rounded-full" style="width:${o.pct||0}%"></div></div>
        </div>`).join('');

      return `<div class="grid lg:grid-cols-5 gap-6">
        <div class="lg:col-span-2 space-y-6">
          <div class="surface p-5">
            <h3 class="font-semibold mb-3">Company snapshot</h3>
            <dl class="space-y-2.5 text-[13px]">
              ${row('Registered', ipo.registered_address)}
              ${row('Phone', ipo.telephone)}
              ${row('Email', ipo.email)}
              ${row('Website', ipo.website)}
            </dl>
          </div>
          <div class="surface p-5">
            <h3 class="font-semibold mb-3">Intermediaries</h3>
            <dl class="space-y-2.5 text-[13px]">
              ${row('Lead manager', ipo.brlm_name)}
              ${row('Registrar', ipo.registrar_name)}
              ${row('Auditor', ipo.statutory_auditor)}
              ${row('Legal advisor', ipo.legal_advisor)}
            </dl>
          </div>
          <div class="surface p-5">
            <h3 class="font-semibold mb-3">Management</h3>
            <dl class="space-y-2.5 text-[13px]">
              ${row('CFO', ipo.cfo_name)}
              ${row('Company secretary', ipo.company_secretary_name)}
            </dl>
          </div>
        </div>

        <div class="lg:col-span-3 space-y-6">
          <div class="surface p-5">
            <h3 class="font-semibold mb-4">Key metrics</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
              ${metric('EPS (basic)', strip(ipo.eps_basic))}
              ${metric('P/E ratio', ipo.pe_ratio)}
              ${metric('ROE', ipo.roe_percent, 'text-primary-600')}
              ${metric('ROCE', ipo.roce_percent, 'text-primary-600')}
              ${metric('NAV / share', strip(ipo.nav_per_share))}
              ${metric('P/B', ipo.price_to_book_value)}
              ${metric('Rev. growth', ipo.revenue_growth_percent, 'text-primary-600')}
              ${metric('PAT margin', ipo.pat_margin_percent)}
              ${metric('Latest debt', debt!=null?amtFromLakhs(debt,unit):'TBA')}
            </div>
          </div>
          <div class="surface p-5">
            <div class="flex items-center justify-between mb-4">
              <h3 class="font-semibold">Objects of the issue</h3>
              ${ipo.total_project_cost?`<span class="text-[12px] text-textMuted">Total ${strip(ipo.total_project_cost)}</span>`:''}
            </div>
            <div class="space-y-4">${objects||'<p class="text-textMuted text-[13px]">Not disclosed.</p>'}</div>
          </div>
        </div>
      </div>`;
    }
    function row(k,v){ return `<div class="flex gap-3"><dt class="w-32 shrink-0 text-textMuted">${k}</dt><dd class="text-text break-words">${v||'—'}</dd></div>`; }

    /* ---------------- TAB: FINANCIALS ---------------- */
    function tabFinancials(){
      if (!ipo.financial_years) return notReady('Financials coming soon');
      const yrs = ipo.financial_years;
      const unit = Math.max(...ipo.total_revenue) >= 100000 ? 'cr' : 'l';
      const rev = ipo.total_revenue, pat = ipo.profit_after_tax;
      const maxRev = Math.max(...rev);
      const scale = unit === 'cr' ? 100 : 1;
      const compact = n => n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'') + 'k' : Math.round(n).toLocaleString('en-IN');
      const niceCeil = v => { const p = Math.pow(10, Math.floor(Math.log10(v))); const n = v/p; const s = n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10; return s*p; };
      const axisMax = niceCeil(maxRev * 1.12);
      const grid = [axisMax, axisMax*2/3, axisMax/3, 0];
      const bar = (v, cls, txt) => `<div class="relative w-8 sm:w-9 rounded-t-md ${cls} transition-all" style="height:${(v/axisMax*100).toFixed(1)}%">
            <span class="absolute -top-5 left-1/2 -translate-x-1/2 text-[10px] mono font-semibold ${txt} whitespace-nowrap">${compact(v/scale)}</span></div>`;

      const frow = (label, arr, hl) => `<tr>
        <td class="text-textMuted">${label}</td>
        ${arr.map(v=>`<td class="text-right mono ${hl||'text-text'}">${amtFromLakhs(v,unit)}</td>`).join('')}
      </tr>`;

      return `<div class="grid lg:grid-cols-5 gap-6">
        <div class="lg:col-span-3 surface p-5">
          <div class="flex items-start justify-between mb-5">
            <div>
              <h3 class="font-semibold">Revenue vs PAT</h3>
              <p class="text-[12px] text-textMuted mt-0.5">3-year restated · ${unit==='cr'?'₹ Crore':'₹ Lakh'}</p>
            </div>
            <div class="flex items-center gap-3 text-[11.5px] text-textSecondary">
              <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm bg-primary-500"></span>Revenue</span>
              <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-sm bg-violet-500"></span>PAT</span>
            </div>
          </div>
          <div class="flex gap-2.5" style="height:190px">
            <div class="flex flex-col justify-between w-9 shrink-0 text-right">
              ${grid.map(g=>`<span class="text-[9px] text-slate-400 mono leading-none">${compact(g/scale)}</span>`).join('')}
            </div>
            <div class="relative flex-1">
              ${grid.map((g,idx)=>`<div class="absolute left-0 right-0 ${idx===grid.length-1?'border-t border-border':'border-t border-dashed border-borderSoft'}" style="top:${(idx/(grid.length-1)*100).toFixed(1)}%"></div>`).join('')}
              <div class="absolute inset-0 flex items-end justify-around gap-4 px-1">
                ${yrs.map((y,i)=>`<div class="flex-1 max-w-[110px] h-full flex items-end justify-center gap-2">
                    ${bar(rev[i],'bg-gradient-to-t from-primary-600 to-primary-400','text-primary-700')}
                    ${bar(pat[i],'bg-gradient-to-t from-violet-500 to-violet-400','text-violet-700')}
                  </div>`).join('')}
              </div>
            </div>
          </div>
          <div class="flex gap-2.5 mt-2">
            <div class="w-9 shrink-0"></div>
            <div class="flex-1 flex justify-around px-1">${yrs.map(y=>`<span class="flex-1 max-w-[110px] text-center text-[11px] text-textMuted mono">${y}</span>`).join('')}</div>
          </div>
        </div>
        <div class="lg:col-span-2 space-y-3">
          <div class="surface p-5">
            <h3 class="font-semibold mb-3">Margins & growth</h3>
            <div class="grid grid-cols-3 gap-3">
              <div class="kpi"><div class="kpi-label">Rev growth</div><div class="kpi-value text-primary-600">${ipo.revenue_growth_percent||'—'}</div></div>
              <div class="kpi"><div class="kpi-label">EBITDA mgn</div><div class="kpi-value">${ipo.ebitda_margin_percent||'—'}</div></div>
              <div class="kpi"><div class="kpi-label">PAT mgn</div><div class="kpi-value">${ipo.pat_margin_percent||'—'}</div></div>
            </div>
          </div>
          <div class="surface p-5">
            <h3 class="font-semibold mb-2">Borrowings breakdown</h3>
            <p class="text-[12.5px] text-textSecondary leading-relaxed">${ipo.borrowings_breakdown||'—'}</p>
            ${ipo.contingent_liabilities?`<p class="text-[12px] text-textMuted mt-3">Contingent liabilities: <span class="text-text">${strip(ipo.contingent_liabilities)}</span></p>`:''}
          </div>
        </div>

        <div class="lg:col-span-5 surface p-5 overflow-x-auto">
          <h3 class="font-semibold mb-4">Restated financials</h3>
          <table class="dt min-w-[520px]">
            <thead><tr><th>₹ figures</th>${yrs.map(y=>`<th class="text-right">${y}</th>`).join('')}</tr></thead>
            <tbody>
              ${frow('Total revenue', ipo.total_revenue)}
              ${frow('Total income', ipo.total_income)}
              ${frow('EBITDA', ipo.ebitda)}
              ${frow('Profit after tax', ipo.profit_after_tax, 'text-primary-600')}
              ${frow('Net worth', ipo.net_worth)}
              ${frow('Total assets', ipo.total_assets)}
              ${frow('Total borrowings', ipo.total_borrowings, 'text-amber-700')}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    /* ---------------- TAB: ISSUE DETAILS ---------------- */
    function tabIssue(upper){
      if (!hasDetail) return notReady('Issue details coming soon');
      const freshVal = ipo.fresh_issue_shares && upper ? ipo.fresh_issue_shares*upper : null;
      const ofsVal = ipo.offer_for_sale_shares && upper ? ipo.offer_for_sale_shares*upper : null;
      const toCr = v => v==null?'—':'₹'+(v/1e7).toLocaleString('en-IN',{maximumFractionDigits:1})+' Cr';
      // allocation donut
      const q=(ipo.qib_shares||0)*100, n=(ipo.nii_shares||0)*100, r=(ipo.retail_shares||0)*100;
      const d1=q*3.6, d2=(q+n)*3.6;

    /* ---------------- TAB: GMP & SUBS ---------------- */

        const arr = g.trend==='up'?'▲':g.trend==='down'?'▼':'→';

    function lockedCard(title, body, big, tag){
