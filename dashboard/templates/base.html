<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IPO Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="h-full">
    <div class="flex h-full">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="p-4 border-b border-gray-700">
                <h1 class="text-lg font-bold">IPO Dashboard</h1>
                <p class="text-xs text-gray-400">Phase 1 + Panel</p>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a href="/dashboard/" class="flex items-center px-3 py-2 rounded text-sm {% if request.url.path == '/dashboard/' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800{% endif %}">
                    <span class="mr-3">📊</span> Overview
                </a>
                <a href="/dashboard/ipos" class="flex items-center px-3 py-2 rounded text-sm {% if request.url.path.startswith('/dashboard/ipos') %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800{% endif %}">
                    <span class="mr-3">📋</span> IPO List
                </a>
                <a href="/dashboard/scrape" class="flex items-center px-3 py-2 rounded text-sm {% if request.url.path == '/dashboard/scrape' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800{% endif %}">
                    <span class="mr-3">🔄</span> Scrape Monitor
                </a>
                <a href="/dashboard/logs" class="flex items-center px-3 py-2 rounded text-sm {% if request.url.path == '/dashboard/logs' %}bg-gray-700 text-white{% else %}text-gray-300 hover:bg-gray-800{% endif %}">
                    <span class="mr-3">📜</span> Logs
                </a>
            </nav>
            <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
                {{ stats.total_ipos }} IPOs · v3.0
            </div>
        </div>

        <!-- Main content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b px-6 py-3 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-800">{% block heading %}Dashboard{% endblock %}</h2>
                <div class="flex items-center space-x-3">
                    <span class="text-sm text-gray-500" id="clock"></span>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleString();
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
