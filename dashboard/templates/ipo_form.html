{% extends "base.html" %}
{% block title %}{{ 'Edit' if ipo else 'Add' }} IPO - IPO Dashboard{% endblock %}
{% block heading %}{{ 'Edit' if ipo else 'Add' }} IPO{% endblock %}
{% block content %}

<div class="bg-white rounded-lg shadow p-6 max-w-2xl">
    <form method="post" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Company Name *</label>
                <input type="text" name="company_name" value="{{ ipo.company_name if ipo else '' }}" required
                    class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Status</label>
                <select name="status" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
                    <option value="drhp_filed" {% if ipo and ipo.status == 'drhp_filed' %}selected{% endif %}>DRHP Filed</option>
                    <option value="sebi_approved" {% if ipo and ipo.status == 'sebi_approved' %}selected{% endif %}>SEBI Approved</option>
                    <option value="rhp_filed" {% if ipo and ipo.status == 'rhp_filed' %}selected{% endif %}>RHP Filed</option>
                    <option value="upcoming" {% if ipo and ipo.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
                    <option value="open" {% if ipo and ipo.status == 'open' %}selected{% endif %}>Open</option>
                    <option value="listed" {% if ipo and ipo.status == 'listed' %}selected{% endif %}>Listed</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">CIN</label>
                <input type="text" name="cin" value="{{ ipo.cin if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm font-mono">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Platform</label>
                <select name="platform" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
                    <option value="">Select...</option>
                    <option value="MainBoard" {% if ipo and ipo.platform == 'MainBoard' %}selected{% endif %}>MainBoard</option>
                    <option value="SME" {% if ipo and ipo.platform == 'SME' %}selected{% endif %}>SME</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Price Band</label>
                <input type="text" name="price_band" value="{{ ipo.price_band if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Face Value</label>
                <input type="number" step="0.1" name="face_value" value="{{ ipo.face_value if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700">Website</label>
                <input type="text" name="website" value="{{ ipo.website if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700">DRHP URL</label>
                <input type="url" name="drhp_url" value="{{ ipo.drhp_url if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700">RHP URL</label>
                <input type="url" name="rhp_url" value="{{ ipo.rhp_url if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">DRHP Filed Date</label>
                <input type="date" name="drhp_filed_date" value="{{ ipo.drhp_filed_date if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Close Date</label>
                <input type="date" name="close_date" value="{{ ipo.close_date if ipo else '' }}" class="mt-1 block w-full border rounded px-3 py-2 text-sm">
            </div>
        </div>
        <div class="flex gap-3 pt-4">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded text-sm hover:bg-blue-700">
                {{ 'Update' if ipo else 'Create' }} IPO
            </button>
            <a href="/dashboard/ipos" class="px-4 py-2 bg-gray-200 rounded text-sm hover:bg-gray-300">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
