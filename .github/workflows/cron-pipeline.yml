# Full IPO pipeline: scrape → find new/updated → resolve → parse
# Runs every 15 minutes on Railway prod.
#
# Setup (one-time):
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#     IPO_API_URL          e.g. https://your-railway-app.up.railway.app   (no trailing slash)
#     INTERNAL_API_KEY     same value as the API's INTERNAL_API_KEY env var

name: IPO Pipeline

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Optional year filter (e.g. 2026). Blank = all."
        required: false

permissions:
  contents: read

concurrency:
  group: cron-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run full pipeline
        env:
          API_URL: ${{ secrets.IPO_API_URL }}
          KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          set -euo pipefail
          : "${API_URL:?missing IPO_API_URL secret}"
          : "${KEY:?missing INTERNAL_API_KEY secret}"
          API="${API_URL%/}"

          _curl() {
            curl -fsS -H "X-Internal-Key: ${KEY}" -H "Content-Type: application/json" "$@"
          }

          echo "=== STEP 1: Scrape all sources ==="
          scrape_url="${API}/api/refresh"
          YEAR="${{ github.event.inputs.year }}"
          if [ -n "${YEAR:-}" ]; then scrape_url="${scrape_url}?year=${YEAR}"; fi
          scrape_resp=$(_curl -X POST -m 300 "$scrape_url")
          echo "$scrape_resp" | jq .
          task_id=$(echo "$scrape_resp" | jq -r '.task_id // empty')
          if [ -n "$task_id" ]; then
            echo "Scrape task: $task_id — waiting..."
            for i in $(seq 1 30); do
              sleep 10
              status=$(_curl -m 10 "${API}/api/tasks/${task_id}" 2>/dev/null | jq -r '.status // "running"')
              [ "$status" = "completed" ] && echo "Scrape done" && break
            done
          fi

          echo ""
          echo "=== STEP 2: Find IPOs needing resolve ==="
          raw=$(_curl -m 30 "${API}/api/ipos?documents=any&per_page=200" 2>/dev/null)
          total=$(echo "$raw" | jq -r '.pagination.total_records // 0')
          echo "IPOs with documents: $total"

          to_resolve=$(echo "$raw" | jq -r '[.data[] | select(
            (.documents_processed.drhp // false) == false or
            (.documents_processed.rhp // false) == false
          ) | .id] | join(" ")')
          if [ -z "$to_resolve" ]; then
            echo "Nothing to resolve"
          else
            echo "Resolving IDs: $to_resolve"
            for id in $to_resolve; do
              echo "  → POST /api/ipos/$id/resolve"
              _curl -X POST -m 300 "${API}/api/ipos/${id}/resolve" | jq '{task_id, status}'
            done
          fi

          echo ""
          echo "=== STEP 3: Parse resolved IPOs ==="
          raw2=$(_curl -m 30 "${API}/api/ipos?per_page=200" 2>/dev/null)
          to_parse=$(echo "$raw2" | jq -r '[.data[] | select(
            (.documents_processed.drhp == true or .documents_processed.rhp == true) and
            .publish_status == null
          ) | .id] | join(" ")')
          if [ -z "$to_parse" ]; then
            echo "Nothing to parse"
          else
            echo "Parsing IDs: $to_parse"
            for id in $to_parse; do
              echo "  → POST /api/ipos/$id/parse-firecrawl"
              _curl -X POST -m 300 "${API}/api/ipos/${id}/parse-firecrawl" | jq '{task_id, status}'
            done
          fi

          echo ""
          echo "=== Pipeline complete ==="
